<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
:root {
  --field:#F5F4F0; --card:#FFFFFF; --line:#E3E1DB; --ink:#1C1E21; --mut:#6B6E73;
  --acc:#0F6B6B; --accSoft:#E3EFEF; --warn:#B4540A; --over:#A6272F; --ok:#4A7A4E; --wait:#7B7E96;
  --soft:#FBFAF8; --warnbg:#F8F0E7; --overbg:#F8ECEC;
}
@media (prefers-color-scheme: dark) {
  :root {
    --field:#141517; --card:#1F2124; --line:#33363B; --ink:#E9EAEC; --mut:#9CA0A6;
    --acc:#3AA6A0; --accSoft:#173231; --warn:#E0954D; --over:#E07A7F; --ok:#7CB183; --wait:#9DA0BC;
    --soft:#26282C; --warnbg:#3A2E1B; --overbg:#3B2326;
  }
}
html { color-scheme: light dark; background:var(--field); }
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; background:var(--field); color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; font-size:15px; line-height:1.5; }
.board { padding:calc(16px + env(safe-area-inset-top)) 16px 80px; }
.wrap { max-width:680px; margin:0 auto; }
.mono { font-family:'IBM Plex Mono',monospace; }
.hdr { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.hdr h1 { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; margin:0; letter-spacing:-0.01em; }
.hdate { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mut); }
.counts { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mut); margin-bottom:14px; }
.counts b { color:var(--ink); font-weight:500; }
.savedot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--ok); margin-left:8px; vertical-align:middle; }
.savedot.err { background:var(--over); }
.starve { font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--warn); margin:0 0 12px; }
.starvebtn { background:none; border:none; padding:2px; min-height:28px; color:var(--warn); font:inherit;
  text-decoration:underline; text-underline-offset:3px; cursor:pointer; }
.dealctl { display:flex; gap:16px; justify-content:flex-end; margin:-8px 2px 14px; }
.ghost { background:none; border:none; padding:6px 2px; min-height:32px; font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.06em; color:var(--mut); opacity:.75; }
.ghost:hover { color:var(--acc); opacity:1; }
.deal { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
.next { background:var(--card); border:1px solid var(--line); border-left:4px solid var(--acc);
  border-radius:10px; padding:16px 16px 12px; flex:1 1 300px; min-width:0; position:relative; }
.demote { position:absolute; top:8px; right:8px; background:none; border:none; font-family:'IBM Plex Mono',monospace;
  font-size:15px; color:var(--mut); opacity:.55; min-width:32px; min-height:32px; padding:4px; }
.demote:hover { color:var(--acc); opacity:1; }
.next.clear { border-left-color:var(--ok); }
.next.clear .eyebrow { color:var(--ok); }
.next.feed { border-left-color:var(--warn); }
.next .eyebrow { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--acc); margin-bottom:2px; }
.next.feed .eyebrow { color:var(--warn); }
.next .ttl { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mut);
  text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
.next .act { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500; line-height:1.42; margin-bottom:10px; }
.next .nnote { font-size:13.5px; color:var(--mut); margin-bottom:12px; }
.nbtns { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
button { font-family:'Inter',sans-serif; cursor:pointer; }
.bp { background:var(--acc); color:#fff; border:none; border-radius:8px; padding:11px 18px;
  font-size:14px; font-weight:600; min-height:44px; }
.bs { background:transparent; color:var(--mut); border:1px solid var(--line); border-radius:8px;
  padding:11px 16px; font-size:14px; min-height:44px; }
.bs:hover, .bp:hover { filter:brightness(0.96); }
.alink { color:var(--acc); font-weight:500; text-decoration:none; border-bottom:1px solid var(--accSoft); }
.strip { border:1px solid var(--line); border-radius:10px; background:var(--card); padding:10px 14px; margin-bottom:22px; }
.striprow { display:flex; gap:10px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; padding:3px 0; align-items:baseline;
  touch-action:none; cursor:grab; user-select:none; -webkit-user-select:none; }
.striprow.drag { background:var(--accSoft); border-radius:6px; }
.striprow .d { width:64px; flex:none; color:var(--mut); }
.striprow .n { flex:1; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.striprow .left { flex:none; }
.chips { display:flex; gap:6px; flex-wrap:wrap; margin:0 0 16px; }
.chip { font-family:'IBM Plex Mono',monospace; font-size:12px; padding:7px 12px; border-radius:999px;
  border:1px solid var(--line); background:var(--card); color:var(--mut); min-height:34px; }
.chip.on { background:var(--ink); color:var(--field); border-color:var(--ink); }
.sec { margin-bottom:10px; }
.sechdr { width:100%; display:flex; justify-content:space-between; align-items:center; background:none;
  border:none; padding:12px 2px 8px; font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600;
  color:var(--ink); border-bottom:1px solid var(--line); }
.sechdr .cnt { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mut); font-weight:400; }
.row { background:var(--card); border:1px solid var(--line); border-radius:10px; margin-top:8px; overflow:hidden; }
.rowmain { display:flex; gap:12px; padding:12px 14px; align-items:flex-start; }
.circ { flex:none; width:26px; height:26px; margin-top:2px; border-radius:50%; border:2px solid var(--line);
  background:var(--card); padding:0; }
.circ:hover { border-color:var(--acc); }
.circ.did { border-color:var(--ok); background:var(--ok); }
.rowbody { flex:1; min-width:0; text-align:left; background:none; border:none; padding:0; font-size:15px; color:var(--ink); cursor:pointer; }
.ract { display:flex; gap:8px; margin-top:9px; }
.rbtn { font-family:'IBM Plex Mono',monospace; font-size:11.5px; padding:7px 11px; min-height:34px; border:1px solid var(--line); background:var(--field); color:var(--mut); border-radius:7px; }
.rbtn.on { border-color:var(--acc); color:var(--acc); background:var(--accSoft); }
.rttl { font-weight:600; font-size:14.5px; }
.done .rttl { text-decoration:line-through; color:var(--mut); font-weight:500; }
.rfirst { font-size:13.5px; color:var(--mut); margin-top:3px; line-height:1.45; }
.badges { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.tag { font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
  padding:2.5px 7px; border-radius:5px; background:var(--field); color:var(--mut); border:1px solid var(--line); }
.tag.due0 { color:var(--over); border-color:var(--over); background:var(--overbg); }
.tag.due1 { color:var(--warn); border-color:var(--warn); background:var(--warnbg); }
.tag.wait { color:var(--wait); border-color:var(--wait); background:var(--field); }
.tag.link { color:var(--acc); border-color:var(--acc); }
.edit { border-top:1px solid var(--line); padding:14px; background:var(--soft); }
.edit label { display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--mut); margin:10px 0 4px; }
.edit input[type=text], .edit textarea, .edit select, .edit input[type=date] {
  width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:9px 10px; border:1px solid var(--line);
  border-radius:7px; background:var(--card); color:var(--ink); }
.edit textarea { min-height:64px; resize:vertical; }
.editbtns { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.bdanger { background:none; border:1px solid var(--line); color:var(--over); border-radius:8px; padding:9px 14px; font-size:13px; min-height:40px; }
.enote { font-size:13.5px; color:var(--mut); margin-bottom:4px; }
.qcard { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:8px; }
.qq { font-weight:600; font-size:14px; }
.qhint { font-size:12.5px; color:var(--mut); margin:2px 0 8px; }
.qcard input { width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:10px; border:1px solid var(--line);
  border-radius:7px; background:var(--soft); color:var(--ink); }
.qdone { border-left:3px solid var(--ok); }
.rrow { display:flex; gap:10px; align-items:center; background:var(--card); border:1px solid var(--line);
  border-radius:10px; padding:11px 14px; margin-top:8px; flex-wrap:wrap; }
.rttl2 { flex:1 1 220px; min-width:0; }
.rttl2 .t { font-weight:600; font-size:14px; }
.rttl2 .m { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mut); margin-top:1px; }
.rdue { font-family:'IBM Plex Mono',monospace; font-size:11.5px; flex:none; }
.rdate { font-family:'IBM Plex Mono',monospace; font-size:12px; padding:8px; border:1px solid var(--line); border-radius:7px; background:var(--soft); color:var(--ink); }
.bmini { background:var(--accSoft); color:var(--acc); border:none; border-radius:7px; padding:9px 12px; font-size:13px; font-weight:600; min-height:38px; }
.rgroup { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--mut); margin:18px 2px 0; }
.empty { color:var(--mut); font-size:13.5px; padding:14px 4px; }
.banner { background:var(--overbg); border:1px solid var(--over); color:var(--over); border-radius:8px;
  padding:10px 14px; font-size:13px; margin-bottom:16px; }
.onbox { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-top:20px; }
.onbox h2 { font-family:'Space Grotesk',sans-serif; font-size:18px; margin:0 0 8px; }
.onbox p { font-size:14px; color:var(--mut); margin:0 0 12px; }
.onbox textarea { width:100%; min-height:130px; font-family:'IBM Plex Mono',monospace; font-size:11px;
  border:1px solid var(--line); border-radius:8px; padding:10px; background:var(--soft); color:var(--ink); }
@media (prefers-reduced-motion:no-preference) { .row, .next { transition:opacity .18s ease; } }
</style>
</head>
<body>
<div class="board"><div class="wrap" id="app"><div class="empty mono">Loading the board.</div></div></div>
<script>
(function(){
"use strict";
var KEY = "board_app_v1";

/* ---------- dates ---------- */
function pad(n){ return String(n).padStart(2,"0"); }
function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function parseISO(iso){ if(!iso) return null; var p=iso.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function daysUntil(iso){ var t=parseISO(todayISO()), d=parseISO(iso); if(!d) return null; return Math.round((d-t)/86400000); }
function daysAgo(iso){ var n=daysUntil(iso); return n===null?null:-n; }
function fmtDate(iso){ var d=parseISO(iso); if(!d) return ""; return d.toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"}); }
function shortDate(iso){ var d=parseISO(iso); if(!d) return ""; return d.toLocaleDateString("en-CA",{month:"short",day:"numeric"}); }
function addDays(iso,n){ var d=parseISO(iso); d.setDate(d.getDate()+n); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function dayDiff(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- storage ---------- */
var mem = null, lsOk = false;
try { var tk="__t"+Date.now(); window.localStorage.setItem(tk,"1"); window.localStorage.removeItem(tk); lsOk = true; } catch(e){ lsOk = false; }
var cwsOk = !lsOk && typeof window.storage !== "undefined" && window.storage && window.storage.get;
function storeGet(){ if(lsOk){ try { return window.localStorage.getItem(KEY); } catch(e){} } return mem; }
function storeSet(v){
  mem = v;
  if(lsOk){ try { window.localStorage.setItem(KEY, v); return true; } catch(e){ return false; } }
  if(cwsOk){ try { window.storage.set(KEY, v).catch(function(){}); } catch(e){} }
  return true;
}
function initLoad(cb){
  if(lsOk || !cwsOk){ cb(storeGet()); return; }
  window.storage.get(KEY).then(function(r){ mem = r ? r.value : null; cb(mem); })
    .catch(function(){ cb(null); });
}

/* ---------- one back end, encrypted, on a private gist ---------- */
var SYNCKEY = "board_sync_v1";
var syncCfg = null;
try { var sraw = lsOk ? window.localStorage.getItem(SYNCKEY) : null; if(sraw) syncCfg = JSON.parse(sraw); } catch(e){}
var syncState = syncCfg ? "idle" : "off";
var syncMsg = "";
var syncDecryptFail = false;
function saveSyncCfg(){ if(lsOk){ try { if(syncCfg) window.localStorage.setItem(SYNCKEY, JSON.stringify(syncCfg)); else window.localStorage.removeItem(SYNCKEY); } catch(e){} } }
function b64(buf){ var b=""; new Uint8Array(buf).forEach(function(x){ b += String.fromCharCode(x); }); return btoa(b); }
function unb64(s){ var bin=atob(s); var a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a.buffer; }
function deriveKey(pass){
  var enc = new TextEncoder();
  return crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]).then(function(km){
    return crypto.subtle.deriveKey({name:"PBKDF2", salt:enc.encode("the-board-v1"), iterations:150000, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
  });
}
function encryptStr(pass, plain){
  var iv = crypto.getRandomValues(new Uint8Array(12));
  return deriveKey(pass).then(function(k){
    return crypto.subtle.encrypt({name:"AES-GCM", iv:iv}, k, new TextEncoder().encode(plain));
  }).then(function(ct){ return JSON.stringify({iv:b64(iv.buffer), ct:b64(ct)}); });
}
function decryptStr(pass, packed){
  var o = JSON.parse(packed);
  return deriveKey(pass).then(function(k){
    return crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(unb64(o.iv))}, k, unb64(o.ct));
  }).then(function(pt){ return new TextDecoder().decode(pt); });
}
function gh(path, method, body, token){
  return fetch("https://api.github.com"+path, {
    method: method||"GET",
    headers: { "Authorization":"Bearer "+token, "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ if(!r.ok) throw new Error("GitHub said "+r.status); return r.json(); });
}
function findOrCreateGist(token){
  return gh("/gists?per_page=100", "GET", null, token).then(function(list){
    for(var i=0;i<list.length;i++){ if(list[i].files && list[i].files["board.json.enc"]) return list[i].id; }
    return gh("/gists", "POST", { description:"The Board sync", public:false, files:{ "board.json.enc":{ content:"{}" } } }, token).then(function(g){ return g.id; });
  });
}
function rich(d){
  if(!d || !d.tasks) return 0;
  var s = 0;
  d.tasks.forEach(function(t){ if(t.status==="done") s += 10; if(t.snoozeCount) s += t.snoozeCount; });
  if(d.unknowns) d.unknowns.forEach(function(u){ if(u.a) s += 5; });
  if(d.recurring) d.recurring.forEach(function(r){ if(r.lastDone) s += 3; });
  return s;
}
var pushTimer = null;
function syncPush(){
  if(!syncCfg || !data) return;
  if(syncDecryptFail){ syncState="err"; syncMsg="passphrase mismatch, not pushing"; paintSync(); return; }
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(function(){
    encryptStr(syncCfg.pass, JSON.stringify(data)).then(function(packed){
      return gh("/gists/"+syncCfg.gistId, "PATCH", { files:{ "board.json.enc":{ content: packed } } }, syncCfg.token);
    }).then(function(){ syncState="ok"; syncMsg=""; paintSync(); })
      .catch(function(e){ syncState="err"; syncMsg=String(e.message||e); paintSync(); });
  }, 1200);
}
function syncPull(then){
  if(!syncCfg){ if(then) then(false); return; }
  gh("/gists/"+syncCfg.gistId, "GET", null, syncCfg.token).then(function(g){
    var f = g.files && g.files["board.json.enc"];
    if(!f || !f.content || f.content === "{}"){ syncState="ok"; paintSync(); if(then) then(false); return; }
    return decryptStr(syncCfg.pass, f.content).then(function(plain){
      syncDecryptFail = false;
      var remote = null; try { remote = JSON.parse(plain); } catch(e){}
      if(remote && remote.tasks){
        var newer = String(remote.savedAt||"") > String((data && data.savedAt)||"");
        var guardOk = !(data && rich(remote) === 0 && rich(data) > 0);
        var localEmpty = data && rich(data) === 0 && rich(remote) > 0;
        if(!data || localEmpty || (newer && guardOk)){ data = remote; migrate(data); storeSet(JSON.stringify(data)); render(); }
      }
      syncState="ok"; syncMsg=""; paintSync();
      if(then) then(true);
    }).catch(function(){ syncDecryptFail = true; syncState="err"; syncMsg="Could not decrypt, passphrase mismatch"; paintSync(); if(then) then(false); });
  }).catch(function(e){ syncState="err"; syncMsg=String(e.message||e); paintSync(); if(then) then(false); });
}
function syncLabel(){ if(!syncCfg) return ""; if(syncState==="ok") return " · synced via GitHub"; if(syncState==="err") return " · sync error"; return " · sync pending"; }
function paintSync(){ var el = document.getElementById("synclabel"); if(el) el.textContent = syncLabel(); }

/* ---------- vocabulary ---------- */
var CATS = [
  { id:"campaign", label:"Campaign" },
  { id:"claim", label:"Claim" },
  { id:"case", label:"Case" },
  { id:"health", label:"Health" },
  { id:"money", label:"House and money" },
  { id:"vehicles", label:"Vehicles" },
  { id:"income", label:"Income" },
  { id:"projects", label:"Projects" },
  { id:"people", label:"People" },
  { id:"pillars", label:"Pillars" },
  { id:"general", label:"General" }
];
var OLDCATS = {}; [["bmF2","campaign"],["cmJj","claim"],["bWFsbGV5","case"],["bWVkaWNhbA==","health"]].forEach(function(p){ OLDCATS[atob(p[0])] = p[1]; });
var MODES = ["call","email","online","errand","read","decide"];
var NEEDIDS = ["money","body","house","mind"];
var RGROUPS = [[atob("bmF2"),"Campaign"],["inside","Inside the house"],["outside","Outside and seasonal"],["vehicles","Vehicles"],["money","Money and bills"],["rhythm","Health and rhythm"]];
var DEFAULT_NEEDS = function(){
  var t = todayISO();
  return [
    { id:"money", name:"Money", win:3, lastFed:t },
    { id:"body", name:"Body", win:2, lastFed:t },
    { id:"house", name:"House", win:14, lastFed:t },
    { id:"mind", name:"Mind", win:5, lastFed:t }
  ];
};
var CAT2NEEDS = { campaign:["money","mind"], claim:["money"], case:["money"], health:["body"], money:["money"], vehicles:["house"], income:["money"], projects:["house"], people:["mind"], pillars:[], general:[] };
var ID2NEEDS = { t31:["body"], t32:["mind"], t33:["mind","money"], t34:["body"], t13:["house"], t14:["house"], t15:["house"], t16:["house"], t18:["house"], t21:["house"], t22:["mind"], t10:["body"], t23:["body"], t24:["body"], t28:["body"] };

/* ---------- empty seed, content arrives only by import ---------- */
function freshSeed(){
  return { schemaV:1, needs:DEFAULT_NEEDS(), savedAt:new Date().toISOString(), tasks:[], unknowns:[], recurring:[] };
}

/* ---------- import from the chat artifact's Transfer block ---------- */
function importArtifact(nd){
  var out = { schemaV:1, needs:DEFAULT_NEEDS(), savedAt:new Date().toISOString(),
    tasks:[], unknowns: nd.unknowns || [], recurring: nd.recurring || [] };
  (nd.tasks||[]).forEach(function(t){
    var mc = OLDCATS[t.cat] || t.cat;
    var c = { id:t.id, cat:(CAT2NEEDS.hasOwnProperty(mc)? mc : "general"), pri:t.pri||30, mode:t.mode||"decide",
      status:t.status||"open", due:t.due||null, title:t.title||"", first:t.first||"", note:t.note||"",
      url:t.url, waitingOn:t.waitingOn, snooze:t.snooze, snoozeCount:t.snoozeCount||0, doneAt:t.doneAt||null,
      needs: ID2NEEDS[t.id] || CAT2NEEDS[mc] || [] };
    out.tasks.push(c);
  });
  return out;
}
function migrate(d){
  if(!d.schemaV) d.schemaV = 1;
  if(!d.needs || !d.needs.length) d.needs = DEFAULT_NEEDS();
  if(!d.unknowns) d.unknowns = [];
  if(!d.recurring) d.recurring = [];
  if(!d.prefs) d.prefs = { dealTwo:false };
  if(d.dayOrder){ var tdp = todayISO(); Object.keys(d.dayOrder).forEach(function(k){ if(k < tdp) delete d.dayOrder[k]; }); }
  if(d.demote) delete d.demote;
  var g2c = { nav:"campaign", inside:"money", outside:"money", vehicles:"vehicles", money:"money", rhythm:"health" };
  d.recurring.forEach(function(r){ if(!r.cat) r.cat = (r.id==="r2" ? "general" : (g2c[r.group] || "general")); });
  ["t31","t32","t33","t34"].forEach(function(idd){
    for(var i=0;i<d.tasks.length;i++){
      if(d.tasks[i].id===idd){ var t=d.tasks[i]; t.repeat = true;
        if(t.status==="done"){ t.status="open"; t.lastDone = t.doneAt || todayISO(); t.doneAt = null; } }
    }
  });

function openTasks(){ return data.tasks.filter(function(t){ return t.status==="open"; }); }
function waitingTasks(){ return data.tasks.filter(function(t){ return t.status==="waiting"; }); }
function doneTasks(){ return data.tasks.filter(function(t){ return t.status==="done"; })

function eligible(){ var today = todayISO(); return openTasks().filter(function(t){ return t.snooze !== today; }); }
function effDue(t){ return (t.today === todayISO()) ? todayISO() : t.due; }
function deadlineList(){
  var c = poolItems();
  c.sort(function(a,b){
    var ea = effDue(a), eb = effDue(b);
    var da = ea ? daysUntil(ea) : 9999, db = eb ? daysUntil(eb) : 9999;
    var oa = da<0?-1:0, ob = db<0?-1:0;
    if(oa!==ob) return oa-ob;
    if(da!==db) return da-db;
    var ra = dayRank(a, ea), rb = dayRank(b, eb);
    if(ra!==rb) return ra-rb;
    return (a.pri||99)-(b.pri||99);
  });
  return c;
}
function dayRank(t, e){
  if(!e || !data.dayOrder || !data.dayOrder[e]) return 9999;
  var i = data.dayOrder[e].indexOf(t.id);
  return i < 0 ? 9999 : i;
}
function deadlinePick(){ var l = deadlineList(); return l[0] || null; }
function starvingNeeds(){
  return data.needs.map(function(n){
    var ago = n.lastFed ? daysAgo(n.lastFed) : 999;
    return { n:n, over: ago - n.win };
  }).filter(function(x){ return x.over > 0; }).sort(function(a,b){ return b.over - a.over; });
}
function feedPickNeed(nid){
  var c = poolItems().filter(function(t){ return (t.needs||[]).indexOf(nid) >= 0; })
    .sort(function(a,b){ return (a.pri||99)-(b.pri||99); });
  return c[0] || null;
}
function feedPick(excludeId){
  var order = data.needs.map(function(n){
    var ago = n.lastFed ? daysAgo(n.lastFed) : 999;
    return { n:n, hunger: ago - n.win };
  }).sort(function(a,b){ return b.hunger - a.hunger; });
  var cands = [];
  order.forEach(function(o){
    poolItems().filter(function(t){ return t.id !== excludeId && (t.needs||[]).indexOf(o.n.id) >= 0; })
      .sort(function(a,b){ return (a.pri||99)-(b.pri||99); })
      .forEach(function(t){ if(cands.indexOf(t) < 0) cands.push(t); });
  });
  if(!cands.length) return null;
  return cands[ui.dealSkip % cands.length];
}
function feedNeeds(t){

}
function wrapRec(r){
  var td = todayISO();
  var d = recNextDue(r);
  var due = (r.today === td) ? td : d;
  return { rec:true, rid:r.id, id:"r:"+r.id, cat:(r.cat||"general"), title:r.title, first:(r.note||r.every), note:"",
    due:due, today:r.today, pri:40, needs:(CAT2NEEDS[r.cat]||[]), snoozeCount:0, url:null, status:"open" };
}
function poolItems(){
  var td = todayISO();
  var pool = eligible().slice();
  data.recurring.forEach(function(r){
    if(r.snooze === td) return;
    var w = wrapRec(r);
    if(!w.due) return;
    pool.push(w);
  });
  return pool;
}

function mergeItems(pk){
  var inT = Array.isArray(pk) ? pk : (pk.tasks || []);
  var inR = Array.isArray(pk) ? [] : (pk.recurring || []);
  var added = 0, updated = 0;
  inT.forEach(function(nt){
    if(!nt || !nt.id) return;
    var mc = OLDCATS[nt.cat] || nt.cat;
    if(!CAT2NEEDS.hasOwnProperty(mc)) mc = "general";
    var ex = task(nt.id);
    if(ex){
      ["title","first","note","due","mode","url","waitingOn","pri","repeat","after","snoozeCount"].forEach(function(k){ if(nt[k]!==undefined) ex[k]=nt[k]; });
      if(nt.cat!==undefined) ex.cat = mc;
      if(nt.needs!==undefined) ex.needs = nt.needs;
      if(nt.status!==undefined) ex.status = nt.status;
      updated++;
    } else {
      data.tasks.push({ id:nt.id, cat:mc, pri:nt.pri||30, mode:nt.mode||"decide", status:nt.status||"open",
        due:nt.due||null, title:nt.title||"", first:nt.first||"", note:nt.note||"", url:nt.url,
        waitingOn:nt.waitingOn, repeat:!!nt.repeat, after:nt.after, snoozeCount:0,
        needs: nt.needs || ID2NEEDS[nt.id] || CAT2NEEDS[mc] || [] });
      added++;
    }
  });
  inR.forEach(function(nr){
    if(!nr || !nr.id) return;
    var exr = rec(nr.id);
    if(exr){ ["title","every","days","anchor","note","group","cat"].forEach(function(k){ if(nr[k]!==undefined) exr[k]=nr[k]; }); updated++; }
    else { data.recurring.push({ id:nr.id, title:nr.title||"", every:nr.every||"monthly", days:nr.days||30,
      anchor:nr.anchor, lastDone:nr.lastDone||null, note:nr.note||"", group:nr.group||"rhythm", cat:nr.cat||"general" }); added++; }
  });
  return { added:added, updated:updated };
}

  } else {

    h += '</div>';
    if(ui.transferErr) h += '<div class="empty" style="color:var(--over)">'+esc(ui.transferErr)+'</div>';
  }
  if(ui.shiftOn){
    var W = ui.shiftWin, S = ui.shiftAmt;
    var capT = data.tasks.filter(function(t){ return t.status!=="done" && t.due && daysUntil(t.due) >= 0 && daysUntil(t.due) <= W; });
    var capR = data.recurring.filter(function(r){ if(r.anchor) return false; var nd = recNextDue(r); if(!nd) return false; var nn = daysUntil(nd); return nn >= 0 && nn <= W; });
    h += '<div class="row"><div class="edit" style="border-top:none">';
    h += '<div class="enote">Take everything due in the next '+W+' day'+(W===1?'':'s')+' and move it '+S+' day'+(S===1?'':'s')+' later. Recurring beats caught in the window restart from the landing day, one prompt, no pile up. Seasonal anchors stay put.</div>';
    h += '<label>Window, days ahead to capture: '+W+'</label><input type="range" min="1" max="14" value="'+W+'" data-change="shiftWin" style="width:100%;accent-color:var(--acc)">';
    h += '<label>Shift, days to move: '+S+'</label><input type="range" min="1" max="14" value="'+S+'" data-change="shiftAmt" style="width:100%;accent-color:var(--acc)">';
    h += '<div class="enote">'+capT.length+' dated task'+(capT.length===1?'':'s')+' and '+capR.length+' recurring beat'+(capR.length===1?'':'s')+' would move.</div>';
    h += '<div class="editbtns"><button class="bp" data-act="shiftgo">Shift it</button><button class="bs" data-act="shift">Close</button></div>';
    h += '</div></div>';
  }
  h += '<div class="empty" style="padding:4px 4px 10px">Tap any card to edit it.</div>';

  h += '<div class="chips">';
  ["all"].concat(MODES).concat(NEEDIDS).forEach(function(m){
    h += '<button class="chip'+(ui.filter===m?' on':'')+'" data-act="chip" data-id="'+m+'">'+m+'</button>';
  });
  h += '</div>';

  CATS.forEach(function(c){
    var list = open.filter(function(t){ return t.cat===c.id && (ui.filter==="all" || t.mode===ui.filter || (t.needs||[]).indexOf(ui.filter)>=0); })
      .sort(function(a,b){ return (a.pri||99)-(b.pri||99); });
    var recs = (ui.filter==="all") ? data.recurring.filter(function(r){ return (r.cat||"general")===c.id; }) : [];
    if(!list.length && !recs.length) return;
    h += '<div class="sec"><button class="sechdr" data-act="cat" data-id="'+c.id+'"><span>'+esc(c.label)+'</span><span class="cnt">'+(list.length+recs.length)+' '+(ui.open[c.id]?'−':'+')+'</span></button>';
    if(ui.open[c.id]){
      h += '<div class="rows">';
      list.forEach(function(t){ h += rowHtml(t); });
      recs.forEach(function(r){ h += recSlimHtml(r); });
      h += '</div>';
    }
    h += '</div>';
  });

  h += '<div class="addbox">';
  if(!ui.showAdd){
    h += '<button class="bs" data-act="add-open">+ Add a task</button>';
  } else {
    h += '<div class="row"><div class="edit" style="border-top:none">';
    h += '<label>Title</label><input type="text" data-field="add.title" value="'+esc(ui.add.title)+'">';
    h += '<label>First action</label><textarea data-field="add.first">'+esc(ui.add.first)+'</textarea>';
    h += '<label>Feeds, comma separated: money, body, house, mind</label><input type="text" data-field="add.needs" value="'+esc(ui.add.needs)+'">';
    h += '<label>Category</label><select data-change="add.cat">';
    CATS.forEach(function(c){ h += '<option value="'+c.id+'"'+(ui.add.cat===c.id?' selected':'')+'>'+esc(c.label)+'</option>'; });
    h += '</select><label>Mode</label><select data-change="add.mode">';
    MODES.forEach(function(m){ h += '<option value="'+m+'"'+(ui.add.mode===m?' selected':'')+'>'+m+'</option>'; });
    h += '</select><label>Due date, optional</label><input type="date" data-change="add.due" value="'+esc(ui.add.due)+'">';
    h += '<div class="editbtns"><button class="bp" data-act="add-submit">Add it</button><button class="bs" data-act="add-cancel">Cancel</button></div>';
    h += '</div></div>';
  }
  h += '</div>';

  if(waiting.length){
    h += '<div class="sec" style="margin-top:24px"><button class="sechdr" data-act="cat" data-id="wait"><span>Waiting on others</span><span class="cnt">'+waiting.length+' '+(ui.open.wait?'−':'+')+'</span></button>';
    if(ui.open.wait){
      h += '<div class="rows">'; waiting.forEach(function(t){ h += rowHtml(t); });
      h += '<div class="empty">These need nothing from you. Parked so your head does not hold them.</div></div>';
    }
    h += '</div>';
  }

  if(data.unknowns.length){
    var unanswered = data.unknowns.filter(function(u){ return !u.a; }).length;
    h += '<div class="sec" style="margin-top:24px"><button class="sechdr" data-act="cat" data-id="q"><span>Questions</span><span class="cnt">'+unanswered+' unanswered '+(ui.open.q?'−':'+')+'</span></button>';
    if(ui.open.q){
      h += '<div class="empty">One at a time, whenever an answer is in your hand anyway. Blanks cost nothing.</div>';
      data.unknowns.forEach(function(u){
        h += '<div class="qcard'+(u.a?' qdone':'')+'"><div class="qq">'+esc(u.q)+'</div>';
        if(u.hint && !u.a) h += '<div class="qhint">'+esc(u.hint)+'</div>';
        h += '<input type="text" placeholder="Type the answer" data-field="q" data-id="'+u.id+'" value="'+esc(u.a)+'"></div>';
      });
    }
    h += '</div>';
  }

  h += '<div class="sec" style="margin-top:24px"><button class="sechdr" data-act="cat" data-id="rec"><span>Recurring</span><span class="cnt">'+data.recurring.length+' '+(ui.open.rec?'−':'+')+'</span></button>';
  if(ui.open.rec){
    h += '<div class="empty">Seasonal items surface by month. Delete what you do not need.</div>';
    var grouped = {};
    data.recurring.forEach(function(r){ var g = r.group || "rhythm"; (grouped[g] = grouped[g] || []).push(r); });
    RGROUPS.forEach(function(pair){
      var list = grouped[pair[0]];
      if(!list || !list.length) return;
      h += '<div class="rgroup">'+esc(pair[1])+'</div>';
      list.forEach(function(r){ h += recRowHtml(r); });
    });
  }
  h += '</div>';

  h += '<div class="sec" style="margin-top:24px"><button class="sechdr" data-act="toggle-done"><span>Closed</span><span class="cnt">'+done.length+' '+(ui.showDone?'−':'+')+'</span></button>';
  if(ui.showDone){
    if(done.length){ h += '<div class="rows">'; done.forEach(function(t){ h += rowHtml(t); }); h += '</div>'; }
    else h += '<div class="empty">Nothing closed yet.</div>';
  }
  h += '</div>';

  app.innerHTML = h;
}

function renderOnboard(app){
  var h = '<div class="hdr"><h1>The Board</h1><span class="hdate">'+esc(fmtDate(todayISO()))+'</span></div>';

/* ---------- events ---------- */
document.addEventListener("click", function(e){
  var el = e.target.closest("[data-act]");
  if(!el) return;
  var act = el.getAttribute("data-act");
  var id = el.getAttribute("data-id");
  if(act==="complete"){ var t=task(id); if(t){
    if(t.repeat){ t.lastDone = todayISO(); t.today = null; t.due = null; t.snooze = todayISO(); feedNeeds(t); if(data.pinId===id) data.pinId=null; }
    else { t.status="done"; t.doneAt=todayISO(); feedNeeds(t); if(data.pinId===id) data.pinId=null; }
    data.tasks.forEach(function(w){ if(w.status==="waiting" && w.after===id){ w.status="open"; w.today=todayISO(); } });
    ui.dealSkip = 0;
    if(data.walk) data.walk.offset = 0;
    ui.feedNeed = null;
    ui.lookAhead = false;
    persist(); render(); } }
  else if(act==="reopen"){ var t2=task(id); if(t2){ t2.status="open"; t2.doneAt=null; persist(); render(); } }
  else if(act==="snooze"){ var t3=task(id); if(t3){ t3.snooze=todayISO(); t3.snoozeCount=(t3.snoozeCount||0)+1; if(data.pinId===id) data.pinId=null; ui.dealSkip=0; if(data.walk) data.walk.offset=0; ui.feedNeed=null; ui.lookAhead=false; persist(); render(); } }
  else if(act==="pin"){ data.pinId = id; ui.expanded=null; persist(); render(); }
  else if(act==="today-toggle"){ var tt=task(id); if(tt){ var td=todayISO(); if(tt.today===td){ tt.today=null; } else { tt.today=td; if(tt.snooze===td) tt.snooze=null; } persist(); render(); } }
  else if(act==="unpin"){ data.pinId = null; persist(); render(); }
  else if(act==="unsnooze"){ var tu=task(id); if(tu){ if(tu.snooze===todayISO() && tu.snoozeCount) tu.snoozeCount = tu.snoozeCount-1; tu.snooze=null; persist(); render(); } }
  else if(act==="redeal"){ ui.dealSkip = (ui.dealSkip||0)+1; render(); }
  else if(act==="dealmode"){ data.prefs = data.prefs || {}; data.prefs.dealTwo = !data.prefs.dealTwo; persist(); render(); }
  else if(act==="expand"){ ui.expanded = (ui.expanded===id ? null : id); ui.confirmDel=null; render(); }
  else if(act==="collapse"){ ui.expanded=null; ui.confirmDel=null; render(); }
  else if(act==="confirmdel"){ ui.confirmDel=id; render(); }
  else if(act==="delete"){
    data.tasks.forEach(function(w){ if(w.status==="waiting" && w.after===id){ w.status="open"; } });
    data.tasks = data.tasks.filter(function(t){ return t.id!==id; });
    ui.expanded=null; ui.confirmDel=null; persist(); render(); }
  else if(act==="chip"){ ui.filter=id; render(); }
  else if(act==="cat"){ ui.open[id] = !ui.open[id]; render(); }
  else if(act==="toggle-done"){ ui.showDone = !ui.showDone; render(); }
  else if(act==="whole"){ ui.whole=true; render(); }
  else if(act==="today"){ ui.whole=false; render(); }
  else if(act==="export"){ ui.export = !ui.export; render(); }
  else if(act==="transfer"){ ui.transfer = !ui.transfer; ui.transferText=""; ui.transferErr=""; ui.confirmDel=null; render(); }
  else if(act==="trfill"){ ui.transferText = JSON.stringify(data); ui.transferErr=""; render(); }
  else if(act==="trreplace"){
    var box = document.getElementById("transferbox");
    var txt = box ? box.value : (ui.transferText||"");
    if(ui.confirmDel !== "transfer"){ ui.transferText = txt; ui.confirmDel = "transfer"; render(); }
    else {
      try {
        var nd = JSON.parse(ui.transferText);
        if(nd && nd.tasks){ data = nd.schemaV ? nd : importArtifact(nd); migrate(data); ui.confirmDel=null; ui.transfer=false; ui.transferText=""; persist(); render(); }
        else { ui.transferErr = "That does not look like board data."; ui.confirmDel=null; render(); }
      } catch(err){ ui.transferErr = "Could not read that, paste the whole block."; ui.confirmDel=null; render(); }
    }
  }
  else if(act==="sync"){ ui.sync = !ui.sync; ui.syncErr=""; render(); }
  else if(act==="syncconnect"){
    var tokEl = document.getElementById("syncToken"), pasEl = document.getElementById("syncPass");
    var tok = tokEl ? tokEl.value.trim() : "", pas = pasEl ? pasEl.value : "";
    if(!tok || !pas){ ui.syncErr = "Both fields, then Connect."; render(); }
    else {
      findOrCreateGist(tok).then(function(gid){
        syncCfg = { token: tok, pass: pas, gistId: gid };
        saveSyncCfg();
        syncState = "idle";
        syncPull(function(){ if(!syncDecryptFail) syncPush(); ui.sync = false; render(); });
      }).catch(function(e){ ui.syncErr = "Could not reach GitHub with that token. "+String(e.message||e); render(); });
    }
  }
  else if(act==="syncpullnow"){ syncPull(function(){ render(); }); }
  else if(act==="syncdisc"){ syncCfg = null; saveSyncCfg(); syncState = "off"; syncDecryptFail = false; ui.sync = false; render(); }
  else if(act==="shift"){ ui.shiftOn = !ui.shiftOn; render(); }
  else if(act==="shiftgo"){
    var W2 = ui.shiftWin, S2 = ui.shiftAmt;
    data.tasks.forEach(function(t){ if(t.status!=="done" && t.due){ var nn = daysUntil(t.due); if(nn >= 0 && nn <= W2){ t.due = addDays(t.due, S2); } } });
    data.recurring.forEach(function(r){ if(r.anchor) return; var nd = recNextDue(r); if(!nd) return; var nn = daysUntil(nd); if(nn >= 0 && nn <= W2){ r.lastDone = addDays(todayISO(), S2 - r.days); } });
    ui.shiftOn = false;
    ui.dealSkip = 0; if(data.walk) data.walk.offset = 0;
    persist(); render();
  }
  else if(act==="tradd"){
    var boxA = document.getElementById("transferbox");
    var txtA = boxA ? boxA.value : "";
    try {
      var pk = JSON.parse(txtA);
      var res = mergeItems(pk);
      ui.transferErr = "Added "+res.added+", updated "+res.updated+".";
      migrate(data); persist(); render();
    } catch(err){ ui.transferErr = "Could not read that as items."; render(); }
  }
  else if(act==="inbox-add"){
    if(ui.inbox){
      try {
        var res2 = mergeItems(ui.inbox);
        migrate(data); persist();
        ui.inboxDone = "Added "+res2.added+", updated "+res2.updated+".";
      } catch(e){ ui.inboxDone = "Could not read those items."; }
      ui.inbox = null; render();
      setTimeout(function(){ ui.inboxDone = null; render(); }, 4000);
    }
  }
  else if(act==="inbox-no"){ ui.inbox = null; render(); }
  else if(act==="editnext"){ var te=task(id); if(te){ ui.whole=true; ui.open[te.cat]=true; ui.expanded=id; render(); } }
  else if(act==="add-open"){ ui.showAdd=true; render(); }
  else if(act==="add-cancel"){ ui.showAdd=false; render(); }
  else if(act==="add-submit"){
    if(ui.add.title.trim()){
      var needsArr = ui.add.needs.split(",").map(function(s){ return s.trim().toLowerCase(); }).filter(function(s){ return needBy(s); });
      data.tasks.push({ id:"x"+Date.now(), cat:ui.add.cat, mode:ui.add.mode, status:"open",
        title:ui.add.title.trim(), first:(ui.add.first.trim() || "Define the first physical step, then do it."),
        due:(ui.add.due||null), note:"", pri:30, needs:needsArr });
      ui.add = { title:"", first:"", cat:"general", mode:"call", due:"", needs:"" };
      ui.showAdd = false; persist(); render();
    }
  }
  else if(act==="recdone"){ var r=rec(id); if(r){ r.lastDone=todayISO(); r.today=null; if(data.pinId==="r:"+id) data.pinId=null; ui.dealSkip=0; if(data.walk) data.walk.offset=0; ui.feedNeed=null; ui.lookAhead=false; persist(); render(); } }
  else if(act==="rec-snooze"){ var rs=rec(id); if(rs){ rs.snooze=todayISO(); rs.today=null; if(data.pinId==="r:"+id) data.pinId=null; ui.dealSkip=0; if(data.walk) data.walk.offset=0; ui.feedNeed=null; ui.lookAhead=false; persist(); render(); } }
  else if(act==="rec-today"){ var rt=rec(id); if(rt){ var td2=todayISO(); if(rt.today===td2){ rt.today=null; } else { rt.today=td2; if(rt.snooze===td2) rt.snooze=null; } persist(); render(); } }
  else if(act==="rec-pin"){ data.pinId = "r:"+id; persist(); render(); }
  else if(act==="rec-unpin"){ data.pinId = null; persist(); render(); }
  else if(act==="redeal0"){ ui.dealSkip = 0; render(); }
  else if(act==="feednow"){ ui.feedNeed = (ui.feedNeed===id ? null : id); ui.whole = false; render(); }
  else if(act==="walknext"){
    if(!data.walk || data.walk.d !== todayISO()) data.walk = { d: todayISO(), offset: 0 };
    data.walk.offset = (data.walk.offset||0) + 1;
    ui.dealSkip = 0;
    persist(); render();
  }
  else if(act==="walk0"){ data.walk = { d: todayISO(), offset: 0 }; ui.dealSkip = 0; ui.lookAhead = false; persist(); render(); }
  else if(act==="lookahead"){ ui.lookAhead = true; render(); }
  else if(act==="lookback"){ ui.lookAhead = false; if(data.walk) data.walk.offset = 0; render(); }
  else if(act==="recdel-ask"){ ui.confirmDel="rec:"+id; render(); }
  else if(act==="recdel-yes"){ data.recurring = data.recurring.filter(function(r){ return r.id!==id; }); ui.confirmDel=null; persist(); render(); }
  else if(act==="onimport"){
    var ob = document.getElementById("onboardbox");
    var raw = ob ? ob.value : "";
    try {
      var nd2 = JSON.parse(raw);
      if(nd2 && nd2.tasks){ data = nd2.schemaV ? nd2 : importArtifact(nd2); migrate(data); persist(); render(); }
      else { ui.onboardErr = "That does not look like board data."; renderOnboard(document.getElementById("app")); if(ob) ob.value = raw; }
    } catch(err){ ui.onboardErr = "Could not read that, paste the whole block from Transfer."; var appEl=document.getElementById("app"); renderOnboard(appEl); var ob2=document.getElementById("onboardbox"); if(ob2) ob2.value = raw; }
  }
  else if(act==="onfresh"){ data = freshSeed(); migrate(data); persist(); render(); }
});

var dragState = null;
document.addEventListener("pointerdown", function(e){
  var row = e.target.closest(".striprow");
  if(!row || !row.getAttribute("data-sid")) return;
  dragState = { row: row, day: row.getAttribute("data-day"), moved: false, startY: e.clientY };
  try { row.setPointerCapture(e.pointerId); } catch(err){}
});
document.addEventListener("pointermove", function(e){
  if(!dragState) return;
  var row = dragState.row;
  if(!dragState.moved && Math.abs(e.clientY - dragState.startY) > 4){ dragState.moved = true; row.classList.add("drag"); }
  if(!dragState.moved) return;
  e.preventDefault();
  var sibs = Array.prototype.slice.call(row.parentNode.querySelectorAll('.striprow[data-day="'+dragState.day+'"]'));
  sibs.forEach(function(s){
    if(s === row) return;
    var r = s.getBoundingClientRect();
    var mid = r.top + r.height / 2;
    if(e.clientY < mid && (s.compareDocumentPosition(row) & 4)){ s.parentNode.insertBefore(row, s); }
    else if(e.clientY > mid && (s.compareDocumentPosition(row) & 2)){ s.parentNode.insertBefore(row, s.nextSibling); }
  });
}, { passive: false });
document.addEventListener("pointerup", function(e){
  if(!dragState) return;
  var st = dragState; dragState = null;
  st.row.classList.remove("drag");
  if(!st.moved) return;
  var ids = Array.prototype.slice.call(st.row.parentNode.querySelectorAll('.striprow[data-day="'+st.day+'"]')).map(function(s){ return s.getAttribute("data-sid"); });
  if(!data.dayOrder) data.dayOrder = {};
  data.dayOrder[st.day] = ids;
  persist(); render();
});
document.addEventListener("input", function(e){
  var el = e.target;
  var f = el.getAttribute("data-field");
  if(!f) return;
  if(f==="q"){ var u=unknown(el.getAttribute("data-id")); if(u){ u.a=el.value; var card=el.closest(".qcard"); if(card) card.classList.toggle("qdone", !!u.a.trim()); persist(); } }
  else if(f==="add.title"){ ui.add.title=el.value; }
  else if(f==="add.first"){ ui.add.first=el.value; }
  else if(f==="add.needs"){ ui.add.needs=el.value; }
  else if(f==="needsCsv"){ var tn=task(el.getAttribute("data-id")); if(tn){ tn.needs = el.value.split(",").map(function(s){ return s.trim().toLowerCase(); }).filter(function(s){ return needBy(s); }); persist(); } }
  else { var t=task(el.getAttribute("data-id")); if(t){ t[f]=el.value; persist(); } }
});

document.addEventListener("change", function(e){
  var el = e.target;
  var c = el.getAttribute("data-change");
  if(!c) return;
  if(c==="add.cat"){ ui.add.cat=el.value; return; }
  if(c==="add.mode"){ ui.add.mode=el.value; return; }
  if(c==="add.due"){ ui.add.due=el.value; return; }
  if(c==="rec"){ var r=rec(el.getAttribute("data-id")); if(r){ r.lastDone=el.value||null; persist(); render(); } return; }
  var t=task(el.getAttribute("data-id"));
  if(!t) return;
  if(c==="shiftWin"){ ui.shiftWin = parseInt(el.value,10)||7; render(); return; }
  if(c==="shiftAmt"){ ui.shiftAmt = parseInt(el.value,10)||7; render(); return; }
  if(c==="repeatSel"){ t.repeat = (el.value==="yes"); persist(); render(); return; }
  if(c==="after"){
    t.after = el.value || null;
    if(t.after && t.status==="open"){ t.status="waiting"; if(!t.waitingOn){ var g = task(t.after); t.waitingOn = g ? g.title : "its gate card"; } }
    persist(); render(); return;
  }
  if(c==="due") t.due = el.value || null;
  else t[c] = el.value;
  persist(); render();
});

/* ---------- init ---------- */
function readHashInbox(){
  try {
    var mh = location.hash.match(/^#add=(.+)$/);
    if(!mh) return;
    var b = mh[1].replace(/-/g,"+").replace(/_/g,"/");
    while(b.length % 4) b += "=";
    var bytes = Uint8Array.from(atob(b), function(ch){ return ch.charCodeAt(0); });
    ui.inbox = JSON.parse(new TextDecoder().decode(bytes));
    history.replaceState(null, "", location.pathname + location.search);
  } catch(e){ ui.inbox = null; }
}
(function init(){
  initLoad(function(raw){
  if(raw){ try { data = JSON.parse(raw); } catch(e){ data = null; } }
  if(data){ migrate(data); }
  readHashInbox();
  render();
  if(syncCfg) syncPull();
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible" && syncCfg) syncPull();
  });
  if("serviceWorker" in navigator && location.protocol.indexOf("http") === 0){
    try { navigator.serviceWorker.register("sw.js"); } catch(e){}
  }
  });
})();
})();
</script>
